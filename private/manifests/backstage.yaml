apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: "backstage"
  labels: 
    app.kubernetes.io/name: backstage
    helm.sh/chart: backstage-2.6.3
    app.kubernetes.io/instance: backstage
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: backstage
  annotations:
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: backstage
      app.kubernetes.io/instance: backstage
      app.kubernetes.io/component: backstage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backstage
        helm.sh/chart: backstage-2.6.3
        app.kubernetes.io/instance: backstage
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: backstage
      annotations:
        checksum/app-config: 441ec86310cd809db40bd910968886ba9ca64251342947324bc5a8528476cd34
    spec:
      serviceAccountName: default
      volumes:
        - name: backstage-app-config
          configMap:
            name: backstage-app-config
      
      containers:
        - name: backstage-backend
          image: ghcr.io/backstage/backstage:latest
          imagePullPolicy: "IfNotPresent"
          command:
            - node
            - packages/backend
          args:
            - "--config"
            - "app-config.yaml"
            - "--config"
            - "/app/app-config-from-configmap.yaml"
          readinessProbe:
            httpGet:
              path: /.backstage/health/v1/readiness
              port: 7007
              scheme: HTTP
          livenessProbe:
            httpGet:
              path: /.backstage/health/v1/liveness
              port: 7007
              scheme: HTTP
          startupProbe:
            httpGet:
              path: /.backstage/health/v1/liveness
              port: 7007
              scheme: HTTP
          env:
            - name: APP_CONFIG_backend_listen_port
              value: "7007"
            - name: POSTGRES_HOST
              value: backstage-postgresql
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: backstage
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backstage-postgresql
                  key: password
          ports:
            - name: backend
              containerPort: 7007
              protocol: TCP
          volumeMounts:
            - name: backstage-app-config
              mountPath: "/app/app-config-from-configmap.yaml"
              subPath: app-config.yaml
